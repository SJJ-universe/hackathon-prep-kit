<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2937" />
  <meta name="description" content="범용 정적 앱 스캐폴드 (주제 비종속 골격)" />
  <title>App Scaffold</title>

  <!--
    폰트: 시스템 폰트 우선 (네트워크 없이도 즉시 렌더, 데모 안전).
    필요 시 아래 한 줄 주석을 해제해 Pretendard CDN을 추가하세요.
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" />
  -->

  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <a class="skip-link" href="#main">본문으로 건너뛰기</a>

  <header class="site-header">
    <div class="container header-inner">
      <h1 class="brand">App Scaffold</h1>
      <!-- TODO: 필요하면 여기에 내비게이션/상태 뱃지 등을 추가 -->
      <span class="badge" aria-hidden="true">MVP</span>
    </div>
  </header>

  <main id="main" class="container main">
    <!-- ============================================================
         입력 영역 (INPUT)
         TODO: 아이디어에 맞는 입력 컨트롤을 여기에 추가.
         흐름은 항상 [입력] -> app.js의 핸들러 -> [계산] -> [결과 영역] 으로 연결.
         label/aria 속성을 유지해 접근성을 지킬 것.
    ============================================================ -->
    <section class="card" aria-labelledby="input-title">
      <h2 id="input-title" class="card-title">입력</h2>

      <form id="app-form" novalidate>
        <div class="field">
          <label class="field-label" for="primary-input">입력값</label>
          <input
            class="input"
            id="primary-input"
            name="primary-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            placeholder="여기에 입력 (예시 자리)"
            aria-describedby="primary-input-help"
          />
          <p class="field-help" id="primary-input-help">
            <!-- TODO: 입력 안내 문구를 아이디어에 맞게 교체 -->
            도움말 자리 (TODO)
          </p>
        </div>

        <!-- TODO: 추가 입력 필드(셀렉트/체크박스/슬라이더 등)를 필요한 만큼 복제 -->

        <div class="actions">
          <button class="btn btn-primary" type="submit" id="run-btn">실행</button>
          <button class="btn btn-ghost" type="reset" id="reset-btn">초기화</button>
        </div>
      </form>
    </section>

    <!-- ============================================================
         결과 영역 (RESULT)
         TODO: app.js의 renderResult()가 이 컨테이너를 채움.
         aria-live로 동적 결과가 보조기기에 안내되도록 유지.
    ============================================================ -->
    <section class="card" aria-labelledby="result-title">
      <h2 id="result-title" class="card-title">결과</h2>
      <div id="result" class="result" aria-live="polite" role="status">
        <p class="muted">아직 결과가 없습니다. 입력 후 실행을 눌러주세요.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="muted small">
        Generic static scaffold · 주제 로직 없음 (당일 작성)
      </p>
    </div>
  </footer>

  <!-- 토스트 컨테이너 (app.js의 toast()가 사용) -->
  <div id="toast-root" class="toast-root" aria-live="assertive" aria-atomic="true"></div>

  <script src="./app.js" defer></script>
</body>
</html>
